<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <title>Calculator</title>
</head>
<body>
    <div class="box">
        <h2>Simple Calculator</h2>

        <div class="box1">
            <label for="first">First No:</label>
            <input type="number" id="first">
        </div>

        <div class="box2">
            <label for="operation">Operation (1:Add 2:Sub 3:Mul 4:Div 5:Rem)</label>
            <input type="number" id="operation">
        </div>

        <div class="box3">
            <label for="second">Second No:</label>
            <input type="number" id="second">
        </div>

        <button id="calcBtn">Calculate</button>

        <div class="result">
            Result: <span id="output">0</span>
        </div>
    </div>

    <script src="./calculator.js"></script>
</body>
</html>
